name: Marmiton Catalog Scrape

on:
  schedule:
    - cron: '0 5 * * 0'   # chaque dimanche à 5h UTC
  workflow_dispatch:        # déclenchement manuel aussi

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-marmiton beautifulsoup4

      - name: Scrape Marmiton
        run: |
          python marmiton_scraper.py \
            --output data/marmiton_catalog.json \
            --per-query 5 \
            --delay 3.0

      - name: Commit catalog
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/marmiton_catalog.json
          git diff --cached --quiet || git commit -m "chore: update Marmiton catalog $(date -u +%Y-%m-%d)"
          git push
