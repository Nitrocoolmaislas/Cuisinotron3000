name: Mirror Colruyt catalog

on:
  schedule:
    - cron: '30 9 * * *'   # 09:30 UTC daily (after scraper runs at ~08:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest Colruyt JSON
        run: |
          BASE="https://storage.googleapis.com/storage/v1/b/colruyt-products/o"
          for i in 0 1 2 3 4 5 6; do
            DATE=$(date -u -d "$i days ago" +%Y-%m-%d)
            MATCH=$(curl -sf "${BASE}?prefix=colruyt-products%2F${DATE}" | \
              python3 -c "import json,sys; d=json.load(sys.stdin); items=d.get('items',[]); print(items[-1]['name']) if items else ''" \
              2>/dev/null)
            if [ -n "$MATCH" ]; then
              ENCODED=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$MATCH")
              if curl -sf "https://storage.googleapis.com/storage/v1/b/colruyt-products/o/${ENCODED}?alt=media" \
                   -o data/colruyt-latest.json; then
                echo "Fetched catalog: $MATCH"
                exit 0
              fi
            fi
          done
          echo "No catalog available for last 7 days -- keeping existing file"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/colruyt-latest.json
          git diff --cached --quiet || git commit -m "chore: update Colruyt catalog $(date -u +%Y-%m-%d)"
          git push
